<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldView - Offline</title>
  <style>
    body { background: #0A0E1A; color: #E8ECF4; font-family: system-ui;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; }
    .c { text-align: center; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #8B95A8; font-size: 0.9rem; }
    button { margin-top: 1rem; padding: 0.5rem 1.5rem; background: #1A2A3A;
             color: #00D4FF; border: 1px solid #1E2A3A; border-radius: 4px;
             cursor: pointer; }
  </style>
</head>
<body>
  <div class="c">
    <h1 id="t-title">You're Offline</h1>
    <p id="t-msg">WorldView requires an internet connection for real-time intelligence data.</p>
    <button id="t-retry" onclick="location.reload()">Retry</button>
  </div>
  <script>
    // Self-contained translations — the SW serves this page with no JS bundle,
    // so we can't reuse i18next. Locale picked from `wm-locale-explicit` (the
    // key the main app writes when a user manually picks a language in
    // Settings → Language) with navigator as fallback. Note: the legacy
    // i18next auto-cache key `i18nextLng` is intentionally NOT consulted —
    // the main app's i18n init wipes it on every load to clear stale-cache
    // pins from prior visits. Table is generated by
    // scripts/sync-offline-translations.mjs from src/locales/<lng>.json shell.offline*
    // — re-run that script after editing the EN strings or adding a locale.
    (function(){
      var T = {
        en: { title: "You're Offline", msg: "WorldView requires an internet connection for real-time intelligence data.", retry: "Retry" },
        ar: { title: "أنت غير متصل", msg: "يتطلب WorldView اتصالاً بالإنترنت للحصول على بيانات الاستخبارات في الوقت الفعلي.", retry: "إعادة محاولة" },
        bg: { title: "Вие сте офлайн", msg: "WorldView изисква интернет връзка за получаване на данни за разузнаване в реално време.", retry: "Повтори" },
        cs: { title: "Jste offline", msg: "WorldView vyžaduje internetové připojení pro data zpravodajství v reálném čase.", retry: "Zkusit znovu" },
        de: { title: "Sie sind offline", msg: "WorldView benötigt eine Internetverbindung für Echtzeit-Nachrichtendaten.", retry: "Erneut versuchen" },
        el: { title: "Είστε Χωρίς Σύνδεση", msg: "Το WorldView απαιτεί σύνδεση στο διαδίκτυο για δεδομένα πραγματικού χρόνου.", retry: "Δοκιμάστε Ξανά" },
        es: { title: "Estás sin conexión", msg: "WorldView requiere una conexión a internet para datos de inteligencia en tiempo real.", retry: "Reintentar" },
        fr: { title: "Vous êtes hors ligne", msg: "WorldView nécessite une connexion Internet pour les données de renseignement en temps réel.", retry: "Réessayer" },
        hi: { title: "आप ऑफलाइन हैं", msg: "वर्ल्ड मॉनिटर के लिए रियल-टाइम जानकारी के लिए इंटरनेट कनेक्शन चाहिए।", retry: "फिर कोशिश करें" },
        hr: { title: "Niste Mrežom Povezani", msg: "Svjetski Monitor zahtijeva internetsku vezu za podatke obavještajne informacije u realnom vremenu.", retry: "Pokušaj Ponovno" },
        hu: { title: "Kapcsolat nélküli mód", msg: "A Világfigyelő valós idejű intelligencia adatokhoz internetkapcsolatra van szüksége.", retry: "Újra" },
        it: { title: "Sei Offline", msg: "WorldView richiede una connessione Internet per i dati di intelligence in tempo reale.", retry: "Riprova" },
        ja: { title: "オフラインです", msg: "WorldViewはリアルタイムインテリジェンスデータのためにインターネット接続が必要です。", retry: "再試行" },
        ko: { title: "오프라인입니다", msg: "WorldView는 실시간 인텔리전스 데이터를 위해 인터넷 연결이 필요합니다.", retry: "다시 시도" },
        nl: { title: "Je bent offline", msg: "WorldView heeft een internetverbinding nodig voor real-time inlichtingengegevens.", retry: "Opnieuw proberen" },
        pl: { title: "Jesteś offline", msg: "WorldView wymaga połączenia internetowego do otrzymywania danych wywiadowczych w czasie rzeczywistym.", retry: "Ponów próbę" },
        pt: { title: "Você está offline", msg: "WorldView requer uma conexão com a internet para dados de inteligência em tempo real.", retry: "Tentar novamente" },
        ro: { title: "Sunteți Offline", msg: "WorldView necesită o conexiune la internet pentru date de informații în timp real.", retry: "Încercați din nou" },
        ru: { title: "Вы не подключены к интернету", msg: "WorldView требует подключение к интернету для получения данных разведки в реальном времени.", retry: "Повторить" },
        sv: { title: "Du är offline", msg: "WorldView kräver en internetanslutning för realtidsunderrättelsedata.", retry: "Försök igen" },
        th: { title: "คุณออนไลน์ไม่ได้", msg: "WorldView ต้องการการเชื่อมต่ออินเทอร์เน็ตเพื่อรับข้อมูลข่าวกรรมการแบบเรียลไทม์", retry: "ลองใหม่" },
        tr: { title: "Çevrimdışısınız", msg: "WorldView, gerçek zamanlı istihbarat verileri için internet bağlantısı gerektirir.", retry: "Yeniden Dene" },
        vi: { title: "Bạn Đang Ngoài Kết Nối", msg: "WorldView cần kết nối internet để cập nhật dữ liệu tình báo real-time.", retry: "Thử Lại" },
        zh: { title: "您已离线", msg: "WorldView 需要互联网连接来获取实时情报数据。", retry: "重试" }
      };
      try {
        var l = (localStorage.getItem('wm-locale-explicit') || navigator.language || 'en').split('-')[0].toLowerCase();
        var d = T[l] || T.en;
        document.documentElement.lang = l;
        if (l === 'ar') document.documentElement.dir = 'rtl';
        document.title = 'WorldView — ' + d.title;
        document.getElementById('t-title').textContent = d.title;
        document.getElementById('t-msg').textContent = d.msg;
        document.getElementById('t-retry').textContent = d.retry;
      } catch (e) { /* keep English defaults */ }
    })();
  </script>
</body>
</html>
