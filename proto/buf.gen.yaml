version: v2

# Managed mode - automatically manages go_package options required by Go-based protoc plugins
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/worldview/proto
    - file_option: go_package_prefix
      module: buf.build/bufbuild/protovalidate
      value: ""
    # sebuf protos are now vendored locally (no BSR module override needed)

plugins:
  - local: protoc-gen-ts-client
    out: ../src/generated/client
    opt:
      - paths=source_relative

  - local: protoc-gen-ts-server
    out: ../src/generated/server
    opt:
      - paths=source_relative

  - local: protoc-gen-openapiv3
    out: ../docs/api

  - local: protoc-gen-openapiv3
    out: ../docs/api
    opt:
      - format=json

  # Unified bundle spanning all WorldView services (sebuf >= 0.11.0).
  # Emits docs/api/worldview.openapi.yaml alongside the per-service files.
  - local: protoc-gen-openapiv3
    out: ../docs/api
    strategy: all
    opt:
      - bundle=true
      - bundle_only=true
      - bundle_output=worldview.openapi.yaml
      - bundle_title=WorldView API
      - bundle_version=1.0.0
      - bundle_description=Unified OpenAPI bundle spanning all WorldView services.
      - bundle_server=https://api.worldview.app
      - bundle_contact_name=WorldView
      - bundle_contact_email=support@worldview.app
